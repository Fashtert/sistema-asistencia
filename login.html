<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ecf0f1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* TARJETA LOGIN */
.card {
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
  text-align: center;
  width: 320px;
}

h2 {
  margin-bottom: 20px;
  color: #2c3e50;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

/* SOLO AGREGADO (no afecta diseño) */
.password-container {
  position: relative;
}

.eye {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* BOTON */
button {
  width: 100%;
  padding: 12px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #2980b9;
}

/* ERROR MINIMO (no rompe diseño) */
#errorMsg {
  color: red;
  font-size: 13px;
  display: none;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Iniciar Sesión</h2>

  <input type="text" id="user" placeholder="Usuario">

  <!-- SOLO ENVOLVEMOS, NO CAMBIAMOS INPUT -->
  <div class="password-container">
    <input type="password" id="pass" placeholder="Contraseña">
    <span class="eye" onclick="togglePassword()">👁</span>
  </div>

  <button onclick="login()">Ingresar</button>

  <!-- MENSAJE DISCRETO -->
  <div id="errorMsg">Usuario o contraseña incorrecta</div>
</div>

<script>
// 👁 VER PASSWORD
function togglePassword(){
  const input = document.getElementById("pass");
  input.type = input.type === "password" ? "text" : "password";
}

// LOGIN (MISMA LOGICA + feedback)
async function login(){
  const username = document.getElementById("user");
  const password = document.getElementById("pass");
  const errorMsg = document.getElementById("errorMsg");

  errorMsg.style.display = "none";

  const res = await fetch("/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ 
      username: username.value, 
      password: password.value 
    })
  });

  const data = await res.json();

  if(data.success){
    if(data.rol === "admin"){
      window.location = "/dashboard.html";
    }else{
      window.location = "/index.html";
    }
  }else{
    errorMsg.style.display = "block";
  }
}

// ENTER = LOGIN
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});
</script>

</body>
</html>
