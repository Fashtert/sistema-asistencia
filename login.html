<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ecf0f1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* TARJETA LOGIN */
.card {
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
  text-align: center;
  width: 320px;
}

h2 {
  margin-bottom: 20px;
  color: #2c3e50;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #2980b9;
}
</style>
</head>

<body>

<div class="card">
  <h2>Iniciar Sesión</h2>

  <input type="text" id="user" placeholder="Usuario">
  <input type="password" id="pass" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
</div>

<script>
async function login(){
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch("/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if(data.success){
    if(data.rol === "admin"){
      window.location = "/dashboard.html";
    }else{
      window.location = "/index.html";
    }
  }else{
    alert("Credenciales incorrectas");
  }
}
</script>

</body>
</html>
