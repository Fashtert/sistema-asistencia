<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Asistencia</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #2c3e50;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar p {
  margin: 10px 0;
  cursor: pointer;
}

/* CONTENIDO */
.main {
  flex: 1;
  background: #ecf0f1;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
}

/* BOTONES */
button {
  padding: 10px 15px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #2980b9;
}

/* TABLA */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #3498db;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>SIS ASISTENCIA</h2>
  <p>Inicio</p>
  <p>Asistencias</p>
  <p>Reportes</p>
</div>

<!-- CONTENIDO -->
<div class="main">

  <h2>Panel de Asistencia</h2>

  <!-- SUBIDA -->
  <div class="card">
    <h3>Subir archivo biométrico</h3>

    <input type="file" id="archivo">
    <br><br>
    <button onclick="enviar()">Procesar Asistencia</button>

    <p id="estado"></p>
  </div>

  <!-- TABLA -->
  <div id="contenedorTabla" class="card hidden">
    <h3>Resultados</h3>

    <table>
      <thead>
        <tr>
          <th>DNI</th>
          <th>Fecha</th>
          <th>Entrada</th>
          <th>Salida</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

</div>

<script>
async function enviar() {
  const archivo = document.getElementById("archivo").files[0];
  const estado = document.getElementById("estado");

  if (!archivo) {
    alert("Selecciona un archivo");
    return;
  }

  estado.innerText = "Procesando...";

  const formData = new FormData();
  formData.append("archivo", archivo);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("Error servidor");

    const data = await res.json();

    const tabla = document.getElementById("tabla");
    const contenedor = document.getElementById("contenedorTabla");

    tabla.innerHTML = "";

    data.forEach(item => {
      const fila = document.createElement("tr");

      fila.innerHTML = `
        <td>${item.id_empleado}</td>
        <td>${item.fecha}</td>
        <td>${item.entrada}</td>
        <td>${item.salida}</td>
        <td>${item.estado}</td>
      `;

      tabla.appendChild(fila);
    });

    contenedor.classList.remove("hidden");
    estado.innerText = "Datos cargados correctamente";

  } catch (error) {
    console.error(error);
    estado.innerText = "Error al procesar archivo";
  }
}
</script>

</body>
</html>
