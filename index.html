<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; display:flex; }

.sidebar {
  width:220px;
  background:#2c3e50;
  color:white;
  height:100vh;
  padding:20px;
}

.main {
  flex:1;
  background:#ecf0f1;
  padding:20px;
}

/* TABLA */
table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#3498db;
  color:white;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:600px;
  display:flex;
  gap:20px;
}

.modal img {
  width:150px;
  height:150px;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>ASISTENCIA</h2>
  <p onclick="location.reload()">Inicio</p>
  <p onclick="logout()">Salir</p>
</div>

<div class="main">

<h2>Control de Asistencia</h2>

<!-- BUSCADOR -->
<input type="text" id="buscar" placeholder="Buscar DNI o nombre">
<button onclick="buscarEmpleado()">Buscar</button>

<!-- SUBIR -->
<br><br>
<input type="file" id="archivo">
<button onclick="enviar()">Subir Archivo</button>

<!-- TABLA -->
<table>
<thead>
<tr>
<th>DNI</th>
<th>Fecha</th>
<th>Entrada</th>
<th>Salida</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    
    <div>
      <img id="foto">
      <p id="nombre"></p>
      <p id="dni"></p>
      <p id="cargo"></p>
    </div>

    <div>
      <canvas id="graficoEmpleado"></canvas>
    </div>

  </div>
</div>

<script>

/* CARGAR TABLA */
async function cargar(){
  const res = await fetch("/asistencias");
  const data = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML="";

  data.forEach(a=>{
    tabla.innerHTML+=`
      <tr onclick="verDetalle('${a.id_empleado}')">
        <td>${a.id_empleado}</td>
        <td>${a.fecha}</td>
        <td>${a.entrada}</td>
        <td>${a.salida}</td>
        <td>${a.estado}</td>
      </tr>
    `;
  });
}

/* BUSCAR */
async function buscarEmpleado(){
  const buscar = document.getElementById("buscar").value;

  const res = await fetch("/empleado-detalle?buscar="+buscar);
  const data = await res.json();

  if(!data) return alert("No encontrado");

  mostrarModal(data);
}

/* MODAL */
function mostrarModal(data){

  document.getElementById("modal").style.display="flex";

  document.getElementById("foto").src = data.foto || "https://via.placeholder.com/150";
  document.getElementById("nombre").innerText = data.nombres;
  document.getElementById("dni").innerText = "DNI: "+data.dni;
  document.getElementById("cargo").innerText = data.cargo;

  new Chart(document.getElementById("graficoEmpleado"),{
    type:"bar",
    data:{
      labels:["Puntual","Tardanza"],
      datasets:[{
        data:[data.puntual||0, data.tardanza||0]
      }]
    }
  });

}

/* CERRAR MODAL */
document.getElementById("modal").onclick = function(){
  this.style.display="none";
}

/* SUBIR */
async function enviar(){
  const archivo = document.getElementById("archivo").files[0];

  const formData = new FormData();
  formData.append("archivo", archivo);

  await fetch("/upload",{ method:"POST", body:formData });

  cargar();
}

/* LOGOUT */
function logout(){
  window.location="/logout";
}

cargar();

</script>

</body>
</html>
